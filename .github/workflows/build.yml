name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Install Capacitor CLI globally
        run: npm install -g @capacitor/cli

      - name: Build web app
        run: npm run build

      - name: Debug - show what build output folder exists
        run: |
          echo "=== Root folder contents ==="
          ls -la
          echo "=== Looking for index.html ==="
          find . -name "index.html" -not -path "*/node_modules/*" 2>/dev/null
          echo "=== dist folder (if exists) ==="
          ls dist/ 2>/dev/null || echo "dist/ not found"
          echo "=== out folder (if exists) ==="
          ls out/ 2>/dev/null || echo "out/ not found"
          echo "=== build folder (if exists) ==="
          ls build/ 2>/dev/null || echo "build/ not found"

      - name: Ensure dist folder has index.html
        run: |
          if [ ! -f "dist/index.html" ]; then
            echo "dist/index.html missing - checking alternate output dirs"
            if [ -f "out/index.html" ]; then
              cp -r out dist
            elif [ -f "build/index.html" ]; then
              cp -r build dist
            else
              echo "ERROR: Could not find index.html in dist, out, or build"
              exit 1
            fi
          fi
          echo "dist/index.html confirmed present"

      - name: Remove old android folder for clean build
        run: rm -rf android

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Fix Gradle permissions
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: chawla-plywood-apk
          path: android/app/build/outputs/apk/debug/*.apk
